{% load static %}
<style>
    @page {
        size: A4;
        margin: 20mm;
    }
    @font-face {

    font-family: "Noto Sans";

    src: url("{{ font_path }}");

}

    body {
        font-family: "Noto Sans";

    font-size: 12pt;

    line-height: 1.7;

    color: #333;
        margin: 0;
        padding: 0;
    }

    .page {
        width: 100%;
    }

    /* Letter header */
    .letterhead {
        text-align: center;
        border-bottom: 2px solid #e5e7eb;
        padding-bottom: 20px;
        margin-bottom: 35px;
    }

    .letterhead h1 {
        margin: 0;
        font-size: 24pt;
        font-weight: bold;
        color: #111827;
    }


    /* Optional domain information box */
    .domain-box {
        border: 1px solid #d1d5db;
        background: #f8fafc;
        padding: 12px 16px;
        margin: 24px 0;
        width: 100%;
        box-sizing: border-box;
    }


    /* Generated letter content */
    .letter-content {
        font-size: 12pt;
        line-height: 1.8;
        color: #333;
    }

    .letter-content p {
        margin: 0 0 16px;
        text-align: justify;
    }


    /* Prevent awkward text breaking */
    p {
        word-wrap: break-word;
    }


    /* Signature spacing */
    .signature {
        margin-top: 40px;
    }
    .stamp {
    margin-top: 30px;
}

.stamp img {
    max-width: 120px;
}

</style>


<div class="page">


    <!-- Official letter heading -->
   {% if is_business %}
<div class="letterhead">
    <h1>{{ company_name }}</h1>
    <h3>{{ company_address }}</h3>
</div>
{% endif %}

    <!-- Generated cover letter -->
    <div class="letter-content">

        {{ letter|safe }}

    </div>


</div>
